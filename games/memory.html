<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/memory.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;500;600;700&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="memory-body">
    <div class="petals-container" id="petalsContainer"></div>

    <!-- ===== DIFFICULTY SELECT ===== -->
    <div class="mem-screen active" id="screenDifficulty">
        <div class="mem-box mem-box--start">
            <a href="../index.html" class="mem-back">← Powrót</a>
            <div class="mem-start-icon">◆</div>
            <h1 class="mem-start-title">Memory</h1>
            <p class="mem-start-desc">Znajdź wszystkie pary zdjęć! Odwracaj po dwie karty i zapamiętuj gdzie co jest.</p>
            <div class="mem-diff-grid">
                <button class="mem-diff-card" onclick="startMemory('easy')">
                    <span class="mem-diff-card__emoji">❋</span>
                    <span class="mem-diff-card__name">Łatwy</span>
                    <span class="mem-diff-card__desc">4 pary (8 kart)</span>
                </button>
                <button class="mem-diff-card" onclick="startMemory('medium')">
                    <span class="mem-diff-card__emoji">✦</span>
                    <span class="mem-diff-card__name">Średni</span>
                    <span class="mem-diff-card__desc">8 par (16 kart)</span>
                </button>
                <button class="mem-diff-card" onclick="startMemory('hard')">
                    <span class="mem-diff-card__emoji">★</span>
                    <span class="mem-diff-card__name">Trudny</span>
                    <span class="mem-diff-card__desc">16 par (32 karty)</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ===== GAME SCREEN ===== -->
    <div class="mem-screen" id="screenGame">
        <div class="mem-box mem-box--game">
            <div class="mem-hud">
                <div class="mem-hud__item">
                    <span class="mem-hud__label">Pary</span>
                    <span class="mem-hud__value" id="pairsFound">0 / 4</span>
                </div>
                <div class="mem-hud__item">
                    <span class="mem-hud__label">Ruchy</span>
                    <span class="mem-hud__value" id="movesCount">0</span>
                </div>
                <div class="mem-hud__item">
                    <span class="mem-hud__label">Czas</span>
                    <span class="mem-hud__value" id="timerDisplay">0:00</span>
                </div>
            </div>
            <div class="mem-grid" id="memoryGrid">
                <!-- cards injected by JS -->
            </div>
        </div>
    </div>

    <!-- ===== RESULTS ===== -->
    <div class="mem-screen" id="screenResults">
        <div class="mem-box mem-box--results">
            <div class="mem-results-icon">★</div>
            <h2 class="mem-results-title">Brawo!</h2>
            <p class="mem-results-sub" id="memResultsSub"></p>
            <div class="mem-results-stats">
                <div class="mem-stat">
                    <span class="mem-stat__icon">◆</span>
                    <span class="mem-stat__value" id="statPairs">0</span>
                    <span class="mem-stat__label">Par</span>
                </div>
                <div class="mem-stat">
                    <span class="mem-stat__icon">↑</span>
                    <span class="mem-stat__value" id="statMoves">0</span>
                    <span class="mem-stat__label">Ruchów</span>
                </div>
                <div class="mem-stat">
                    <span class="mem-stat__icon">◷</span>
                    <span class="mem-stat__value" id="statTime">0:00</span>
                    <span class="mem-stat__label">Czas</span>
                </div>
            </div>
            <div class="mem-results-btns">
                <button class="mem-btn-primary" onclick="restartMemory()">Zagraj ponownie</button>
                <a href="../index.html" class="mem-btn-secondary">Wróć do menu</a>
            </div>
        </div>
    </div>

    <script src="../js/memory.js"></script>
    <script>
        // Petals
        const ctr = document.getElementById('petalsContainer');
        const emj = ['❋','✾','❁','✿','❀'];
        setInterval(() => {
            const p = document.createElement('span');
            p.classList.add('petal');
            p.textContent = emj[Math.floor(Math.random()*emj.length)];
            p.style.left = Math.random()*100+'%';
            p.style.animationDuration = (8+Math.random()*10)+'s';
            p.style.fontSize = (0.7+Math.random()*0.8)+'rem';
            ctr.appendChild(p);
            setTimeout(()=>p.remove(), 18000);
        }, 3000);
    </script>
</body>
</html>
